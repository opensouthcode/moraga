  What happens next with my track request?: "¿Qué ocurre ahora con mi solicitud de track?"
  If you submit a track request, the conference organizers will review it and either accept or reject it.: Si envías una solicitud de track, los organizadores la revisarán y la aceptarán o rechazarán.
  If your track request is accepted, the conference organizers expect you to confirm that you will be able to hold it.: Si tu solicitud de track es aceptada, la organización espera que confirmes que podrás realizarla.
  Then you will be assigned the Track organizer role.: Se te asignará el rol de organizador de track.
  If your track request is rejected, you can either live with that or adapt it and resubmit it for review again.: Si tu solicitud es rechazada, puedes adaptarla y volverla a enviar.
  "If something changes and you can't organize the track any more, you should withdraw it.": "Si algo cambia y ya no puedes organizar el track, deberías retirarlo."
